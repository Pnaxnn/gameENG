<!doctype html>
<html lang="en" class="h-full">
 <head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Word Rain Adventure</title>
  <script src="https://cdn.tailwindcss.com/3.4.17"></script>
  <script src="/_sdk/element_sdk.js"></script>
  <link href="https://fonts.googleapis.com/css2?family=Fredoka:wght@400;500;600;700&amp;family=Nunito:wght@400;600;700;800&amp;display=swap" rel="stylesheet">
  <style>
    * { font-family: 'Nunito', sans-serif; }
    .title-font { font-family: 'Fredoka', sans-serif; }
    
    @keyframes float {
      0%, 100% { transform: translateY(0px); }
      50% { transform: translateY(-10px); }
    }
    
    @keyframes pulse-glow {
      0%, 100% { box-shadow: 0 0 20px rgba(255, 200, 0, 0.4); }
      50% { box-shadow: 0 0 40px rgba(255, 200, 0, 0.8); }
    }
    
    @keyframes rain-fall {
      0% { transform: translateY(-100%); }
      100% { transform: translateY(100%); }
    }
    
    @keyframes sparkle {
      0%, 100% { opacity: 0; transform: scale(0); }
      50% { opacity: 1; transform: scale(1); }
    }
    
    @keyframes bounce-in {
      0% { transform: scale(0); opacity: 0; }
      50% { transform: scale(1.2); }
      100% { transform: scale(1); opacity: 1; }
    }
    
    @keyframes slide-up {
      0% { transform: translateY(30px); opacity: 0; }
      100% { transform: translateY(0); opacity: 1; }
    }
    
    @keyframes shake {
      0%, 100% { transform: translateX(0); }
      25% { transform: translateX(-5px); }
      75% { transform: translateX(5px); }
    }
    
    .float-animation { animation: float 3s ease-in-out infinite; }
    .pulse-glow { animation: pulse-glow 2s ease-in-out infinite; }
    .bounce-in { animation: bounce-in 0.5s ease-out forwards; }
    .slide-up { animation: slide-up 0.4s ease-out forwards; }
    .shake { animation: shake 0.3s ease-in-out; }
    
    .star-filled { color: #FFD700; text-shadow: 0 0 10px rgba(255, 215, 0, 0.5); }
    .star-empty { color: #4a5568; }
    
    .game-btn {
      background: linear-gradient(180deg, #FFE066 0%, #FFB800 100%);
      border: 4px solid #E6A600;
      border-radius: 16px;
      box-shadow: 0 6px 0 #CC9200, 0 8px 20px rgba(0,0,0,0.2);
      transition: all 0.1s ease;
    }
    
    .game-btn:hover {
      transform: translateY(-2px);
      box-shadow: 0 8px 0 #CC9200, 0 10px 25px rgba(0,0,0,0.25);
    }
    
    .game-btn:active {
      transform: translateY(4px);
      box-shadow: 0 2px 0 #CC9200, 0 4px 10px rgba(0,0,0,0.2);
    }
    
    .level-card {
      background: linear-gradient(145deg, #ffffff 0%, #f0f4ff 100%);
      border: 3px solid #e2e8f0;
      border-radius: 20px;
      transition: all 0.3s ease;
    }
    
    .level-card:hover {
      transform: translateY(-5px) scale(1.02);
      border-color: #FFB800;
      box-shadow: 0 15px 30px rgba(255, 184, 0, 0.3);
    }
    
    .level-card.locked {
      opacity: 0.6;
      filter: grayscale(0.5);
    }
    
    .powerup-btn {
      width: 60px;
      height: 60px;
      border-radius: 50%;
      font-size: 24px;
      display: flex;
      align-items: center;
      justify-content: center;
      transition: all 0.2s ease;
    }
    
    .powerup-btn:disabled {
      opacity: 0.4;
      cursor: not-allowed;
    }
    
    .letter-box {
      width: 50px;
      height: 60px;
      background: linear-gradient(180deg, #4F46E5 0%, #3730A3 100%);
      border: 3px solid #312E81;
      border-radius: 12px;
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 28px;
      font-weight: 700;
      color: white;
      box-shadow: 0 4px 0 #1E1B4B;
    }
    
    .falling-letter {
      position: absolute;
      width: 60px;
      height: 60px;
      background: linear-gradient(180deg, #FB923C 0%, #F97316 100%);
      border: 3px solid #EA580C;
      border-radius: 12px;
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 32px;
      font-weight: 700;
      color: white;
      box-shadow: 0 4px 0 #C2410C;
      cursor: pointer;
      transition: all 0.08s ease;
      user-select: none;
    }
    
    .falling-letter:hover {
      transform: scale(1.15);
      box-shadow: 0 6px 0 #C2410C, 0 0 15px rgba(255, 215, 0, 0.6);
    }
    
    .falling-letter:active {
      transform: scale(1.05);
    }
    
    .falling-letter.wrong {
      background: linear-gradient(180deg, #FB923C 0%, #F97316 100%);
      border-color: #EA580C;
      box-shadow: 0 3px 0 #C2410C;
    }
    
    .falling-letter.powerup {
      background: linear-gradient(180deg, #A78BFA 0%, #8B5CF6 100%);
      border-color: #7C3AED;
      box-shadow: 0 3px 0 #6D28D9;
    }
    
    .basket {
      width: 100px;
      height: 60px;
      background: linear-gradient(180deg, #F59E0B 0%, #D97706 100%);
      border: 4px solid #B45309;
      border-radius: 0 0 20px 20px;
      position: absolute;
      bottom: 10px;
      transition: left 0.05s linear;
    }
    
    .progress-bar {
      height: 12px;
      background: #e2e8f0;
      border-radius: 6px;
      overflow: hidden;
    }
    
    .progress-fill {
      height: 100%;
      background: linear-gradient(90deg, #10B981 0%, #34D399 100%);
      border-radius: 6px;
      transition: width 0.3s ease;
    }
    
    .vocab-card {
      background: linear-gradient(145deg, #ffffff 0%, #fef3c7 100%);
      border: 4px solid #F59E0B;
      border-radius: 24px;
      box-shadow: 0 10px 30px rgba(245, 158, 11, 0.2);
    }
    
    .matching-card {
      background: linear-gradient(145deg, #EEF2FF 0%, #C7D2FE 100%);
      border: 3px solid #818CF8;
      border-radius: 16px;
      cursor: pointer;
      transition: all 0.2s ease;
    }
    
    .matching-card:hover {
      transform: scale(1.05);
      border-color: #4F46E5;
    }
    
    .matching-card.selected {
      border-color: #10B981;
      background: linear-gradient(145deg, #D1FAE5 0%, #A7F3D0 100%);
    }
    
    .matching-card.correct {
      border-color: #10B981;
      background: linear-gradient(145deg, #D1FAE5 0%, #A7F3D0 100%);
    }
    
    .matching-card.wrong {
      border-color: #EF4444;
      background: linear-gradient(145deg, #FEE2E2 0%, #FECACA 100%);
    }
    
    .spelling-letter {
      width: 50px;
      height: 60px;
      background: linear-gradient(180deg, #E0E7FF 0%, #C7D2FE 100%);
      border: 3px solid #818CF8;
      border-radius: 12px;
      font-size: 24px;
      font-weight: 700;
      color: #4F46E5;
      cursor: pointer;
      transition: all 0.2s ease;
    }
    
    .spelling-letter:hover {
      transform: translateY(-3px);
      box-shadow: 0 5px 15px rgba(79, 70, 229, 0.3);
    }
    
    .spelling-slot {
      width: 50px;
      height: 60px;
      background: #F3F4F6;
      border: 3px dashed #9CA3AF;
      border-radius: 12px;
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 24px;
      font-weight: 700;
      color: #4F46E5;
    }
    
    .spelling-slot.filled {
      background: linear-gradient(180deg, #D1FAE5 0%, #A7F3D0 100%);
      border: 3px solid #10B981;
    }
    
    .heart { color: #EF4444; }
    .heart-empty { color: #9CA3AF; }
  </style>
  <style>body { box-sizing: border-box; }</style>
  <script src="/_sdk/data_sdk.js" type="text/javascript"></script>
 </head>
 <body class="h-full bg-gradient-to-br from-indigo-900 via-purple-900 to-pink-900 overflow-auto">
  <div id="app" class="w-full h-full"></div>
  <script>
    // Game Configuration
    const defaultConfig = {
      game_title: 'Word Rain Adventure',
      start_button_text: 'Start Game',
      primary_color: '#4F46E5',
      secondary_color: '#FFB800',
      background_color: '#1E1B4B',
      text_color: '#FFFFFF',
      accent_color: '#10B981'
    };

    // Vocabulary Data
    const vocabularyData = [
      { id: 'apple', word: 'APPLE', thai: 'แอปเปิ้ล', emoji: '🍎' },
      { id: 'banana', word: 'BANANA', thai: 'กล้วย', emoji: '🍌' },
      { id: 'orange', word: 'ORANGE', thai: 'ส้ม', emoji: '🍊' },
      { id: 'grape', word: 'GRAPE', thai: 'องุ่น', emoji: '🍇' },
      { id: 'mango', word: 'MANGO', thai: 'มะม่วง', emoji: '🥭' },
      { id: 'cat', word: 'CAT', thai: 'แมว', emoji: '🐱' },
      { id: 'dog', word: 'DOG', thai: 'สุนัข', emoji: '🐕' },
      { id: 'bird', word: 'BIRD', thai: 'นก', emoji: '🐦' },
      { id: 'fish', word: 'FISH', thai: 'ปลา', emoji: '🐟' },
      { id: 'star', word: 'STAR', thai: 'ดาว', emoji: '⭐' }
    ];

    // Game State
    let gameState = {
      currentScreen: 'menu',
      currentLevel: 1,
      unlockedLevels: [1],
      currentWordIndex: 0,
      score: 0,
      lives: 3,
      combo: 0,
      completedLevels: [],
      totalStars: 0,
      highScores: { level1: 0, level2: 0, level3: 0, level4: 0 }
    };

    // Rain Game State
    let rainGame = {
      basketX: 50,
      fallingLetters: [],
      collectedLetters: [],
      targetWord: '',
      gameInterval: null,
      isPlaying: false,
      powerups: { turbo: 1, freeze: 1, magnet: 1, bomb: 1 },
      isTurbo: false,
      isFreeze: false,
      isMagnet: false
    };

    // Initialize SDK
    let config = { ...defaultConfig };

    const dataHandler = {
      onDataChanged(data) {
        renderCurrentScreen();
      }
    };

    function updateUnlockedLevels() {
      gameState.unlockedLevels = [1];
      
      // ด่าน 1 ผ่านแล้ว → เปิดด่าน 2
      if (gameState.completedLevels.includes(1)) {
        gameState.unlockedLevels.push(2);
      }
      
      // ด่าน 2 ผ่านแล้ว → เปิดด่าน 3
      if (gameState.completedLevels.includes(2)) {
        gameState.unlockedLevels.push(3);
      }
      
      // ด่าน 3 ผ่านแล้ว → เปิดด่าน 4
      if (gameState.completedLevels.includes(3)) {
        gameState.unlockedLevels.push(4);
      }
    }

    function saveProgress(levelNum, stars) {
      if (!gameState.completedLevels.includes(levelNum)) {
        gameState.completedLevels.push(levelNum);
      }
      gameState.highScores[`level${levelNum}`] = Math.max(gameState.highScores[`level${levelNum}`], gameState.score);
      gameState.totalStars = calculateTotalStars();
      updateUnlockedLevels();
    }

    // Render Functions
    function renderCurrentScreen() {
      const app = document.getElementById('app');
      switch (gameState.currentScreen) {
        case 'menu': renderMainMenu(app); break;
        case 'levels': renderLevelSelect(app); break;
        case 'howto': renderHowToPlay(app); break;
        case 'level1': renderLevel1(app); break;
        case 'level2': renderLevel2(app); break;
        case 'level3': renderLevel3(app); break;
        case 'level4': renderLevel4(app); break;
        case 'result': renderResult(app); break;
      }
    }

    function renderMainMenu(container) {
      const totalStars = calculateTotalStars();
      container.innerHTML = `
        <div class="w-full h-full flex flex-col items-center justify-center p-6 relative overflow-hidden">
          <!-- Decorative elements -->
          <div class="absolute top-10 left-10 text-6xl float-animation" style="animation-delay: 0s;">🌟</div>
          <div class="absolute top-20 right-16 text-5xl float-animation" style="animation-delay: 0.5s;">📚</div>
          <div class="absolute bottom-20 left-16 text-5xl float-animation" style="animation-delay: 1s;">🎮</div>
          <div class="absolute bottom-10 right-10 text-6xl float-animation" style="animation-delay: 1.5s;">🏆</div>
          
          <!-- Logo/Title -->
          <div class="text-center mb-8 bounce-in">
            <div class="text-8xl mb-4">🌈</div>
            <h1 id="game-title" class="title-font text-5xl md:text-6xl font-bold text-white drop-shadow-lg mb-2">
              ${config.game_title || defaultConfig.game_title}
            </h1>
            <p class="text-xl text-purple-200">เกมฝึกคำศัพท์ภาษาอังกฤษสุดสนุก!</p>
          </div>
          
          <!-- Stars Display -->
          <div class="bg-white/20 backdrop-blur-sm rounded-full px-6 py-3 mb-8 flex items-center gap-3 slide-up">
            <span class="text-3xl">⭐</span>
            <span class="text-2xl font-bold text-yellow-300">${totalStars} / ${vocabularyData.length * 3}</span>
          </div>
          
          <!-- Menu Buttons -->
          <div class="flex flex-col gap-4 w-full max-w-xs">
            <button onclick="navigateTo('levels')" class="game-btn py-4 px-8 text-xl font-bold text-amber-900 hover:scale-105 transition-transform slide-up" style="animation-delay: 0.1s;">
              <span class="flex items-center justify-center gap-3">
                <span class="text-2xl">🎯</span>
                <span id="start-btn-text">${config.start_button_text || defaultConfig.start_button_text}</span>
              </span>
            </button>
            
            <button onclick="navigateTo('howto')" class="bg-gradient-to-r from-cyan-500 to-blue-500 hover:from-cyan-400 hover:to-blue-400 py-4 px-8 rounded-2xl text-xl font-bold text-white shadow-lg hover:scale-105 transition-transform slide-up" style="animation-delay: 0.2s;">
              <span class="flex items-center justify-center gap-3">
                <span class="text-2xl">📖</span>
                <span>วิธีเล่น</span>
              </span>
            </button>
          </div>
        </div>
      `;
    }

    function renderLevelSelect(container) {
      const levels = [
        { num: 1, name: 'เรียนรู้คำศัพท์', desc: 'ดูภาพ ฟังเสียง จำคำศัพท์', icon: '📚', color: 'from-green-400 to-emerald-500' },
        { num: 2, name: 'จับคู่คำศัพท์', desc: 'เลือกคำที่ตรงกับรูปภาพ', icon: '🎯', color: 'from-blue-400 to-indigo-500' },
        { num: 3, name: 'ฝึกสะกดคำ', desc: 'เรียงตัวอักษรให้ถูกต้อง', icon: '✏️', color: 'from-purple-400 to-pink-500' },
        { num: 4, name: 'ฝนตัวอักษร', desc: 'เก็บตัวอักษรพิชิตคำศัพท์!', icon: '🌧️', color: 'from-orange-400 to-red-500' }
      ];

      container.innerHTML = `
        <div class="w-full h-full flex flex-col p-6 overflow-auto">
          <!-- Header -->
          <div class="flex items-center justify-between mb-6">
            <button onclick="navigateTo('menu')" class="bg-white/20 hover:bg-white/30 p-3 rounded-full transition-colors">
              <span class="text-2xl">⬅️</span>
            </button>
            <h2 class="title-font text-3xl font-bold text-white">เลือกด่าน</h2>
            <div class="bg-white/20 rounded-full px-4 py-2 flex items-center gap-2">
              <span class="text-xl">⭐</span>
              <span class="text-lg font-bold text-yellow-300">${calculateTotalStars()}</span>
            </div>
          </div>
          
          <!-- Level Cards -->
          <div class="grid grid-cols-1 md:grid-cols-2 gap-4 flex-1">
            ${levels.map((level, idx) => {
              const isUnlocked = gameState.unlockedLevels.includes(level.num);
              const levelStars = calculateLevelStars(level.num);
              return `
                <div class="level-card ${!isUnlocked ? 'locked' : ''} p-6 cursor-pointer slide-up" 
                     style="animation-delay: ${idx * 0.1}s;"
                     onclick="${isUnlocked ? `startLevel(${level.num})` : 'showLockedMessage()'}">
                  <div class="flex items-start justify-between mb-4">
                    <div class="w-16 h-16 bg-gradient-to-br ${level.color} rounded-2xl flex items-center justify-center text-3xl shadow-lg">
                      ${level.icon}
                    </div>
                    ${!isUnlocked ? '<span class="text-3xl">🔒</span>' : ''}
                  </div>
                  <h3 class="title-font text-xl font-bold text-gray-800 mb-1">ด่านที่ ${level.num}</h3>
                  <p class="text-lg font-semibold text-indigo-600 mb-2">${level.name}</p>
                  <p class="text-sm text-gray-500 mb-3">${level.desc}</p>
                  <div class="flex gap-1">
                    ${[1,2,3].map(i => `<span class="text-2xl ${levelStars >= i ? 'star-filled' : 'star-empty'}">★</span>`).join('')}
                  </div>
                </div>
              `;
            }).join('')}
          </div>
        </div>
      `;
    }

    function renderHowToPlay(container) {
      container.innerHTML = `
        <div class="w-full h-full flex flex-col p-6 overflow-auto">
          <!-- Header -->
          <div class="flex items-center mb-6">
            <button onclick="navigateTo('menu')" class="bg-white/20 hover:bg-white/30 p-3 rounded-full transition-colors mr-4">
              <span class="text-2xl">⬅️</span>
            </button>
            <h2 class="title-font text-3xl font-bold text-white">📖 วิธีเล่น</h2>
          </div>
          
          <div class="flex-1 overflow-auto space-y-4">
            <!-- Level Instructions -->
            <div class="bg-white/95 rounded-2xl p-5 slide-up">
              <h3 class="title-font text-xl font-bold text-green-600 mb-3 flex items-center gap-2">
                <span>📚</span> ด่าน 1: เรียนรู้คำศัพท์
              </h3>
              <p class="text-gray-600">ดูรูปภาพและคำศัพท์ กดปุ่มลำโพงเพื่อฟังเสียงอ่าน พร้อมแล้วกด "ถัดไป" เพื่อเรียนคำใหม่</p>
            </div>
            
            <div class="bg-white/95 rounded-2xl p-5 slide-up" style="animation-delay: 0.1s;">
              <h3 class="title-font text-xl font-bold text-blue-600 mb-3 flex items-center gap-2">
                <span>🎯</span> ด่าน 2: จับคู่คำศัพท์
              </h3>
              <p class="text-gray-600">ดูรูปภาพแล้วเลือกคำศัพท์ที่ถูกต้องจากตัวเลือก 4 ข้อ ตอบถูกจะได้คะแนน!</p>
            </div>
            
            <div class="bg-white/95 rounded-2xl p-5 slide-up" style="animation-delay: 0.2s;">
              <h3 class="title-font text-xl font-bold text-purple-600 mb-3 flex items-center gap-2">
                <span>✏️</span> ด่าน 3: ฝึกสะกดคำ
              </h3>
              <p class="text-gray-600">ดูรูปภาพแล้วกดตัวอักษรเรียงให้เป็นคำศัพท์ที่ถูกต้อง กดผิดสามารถลบแก้ไขได้</p>
            </div>
            
            <div class="bg-white/95 rounded-2xl p-5 slide-up" style="animation-delay: 0.3s;">
              <h3 class="title-font text-xl font-bold text-orange-600 mb-3 flex items-center gap-2">
                <span>🌧️</span> ด่าน 4: ฝนตัวอักษร
              </h3>
              <p class="text-gray-600 mb-3">ตัวอักษรจะตกลงมาเหมือนฝน! กดเก็บตัวอักษรที่ถูกต้องตามคำศัพท์เป้าหมาย</p>
              
              <div class="grid grid-cols-2 gap-3 mt-4">
                <div class="bg-yellow-100 rounded-lg p-3 flex items-center gap-2">
                  <span class="text-2xl">⚡</span>
                  <div>
                    <p class="font-bold text-yellow-700">Turbo</p>
                    <p class="text-xs text-gray-500">เวลาเพิ่ม</p>
                  </div>
                </div>
                <div class="bg-blue-100 rounded-lg p-3 flex items-center gap-2">
                  <span class="text-2xl">❄️</span>
                  <div>
                    <p class="font-bold text-blue-700">Freeze</p>
                    <p class="text-xs text-gray-500">ชะลอการตก</p>
                  </div>
                </div>
                <div class="bg-purple-100 rounded-lg p-3 flex items-center gap-2">
                  <span class="text-2xl">🧲</span>
                  <div>
                    <p class="font-bold text-purple-700">Magnet</p>
                    <p class="text-xs text-gray-500">ดูดตัวอักษรถูก</p>
                  </div>
                </div>
                <div class="bg-red-100 rounded-lg p-3 flex items-center gap-2">
                  <span class="text-2xl">💣</span>
                  <div>
                    <p class="font-bold text-red-700">Bomb</p>
                    <p class="text-xs text-gray-500">ลบตัวหลอกทั้งหมด</p>
                  </div>
                </div>
              </div>
            </div>
            
            <div class="bg-gradient-to-r from-yellow-400 to-orange-400 rounded-2xl p-5 slide-up" style="animation-delay: 0.4s;">
              <h3 class="title-font text-xl font-bold text-white mb-3 flex items-center gap-2">
                <span>⭐</span> ระบบดาวและคะแนน
              </h3>
              <div class="text-white/90 space-y-2">
                <p>• ⭐ 1 ดาว: ผ่านด่าน</p>
                <p>• ⭐⭐ 2 ดาว: ทำคะแนนได้ดี</p>
                <p>• ⭐⭐⭐ 3 ดาว: เก่งมาก! คะแนนสูงสุด</p>
              </div>
            </div>
          </div>
        </div>
      `;
    }

    function renderLevel1(container) {

    // Game Logic Functions
    function navigateTo(screen) {
      gameState.currentScreen = screen;
      renderCurrentScreen();
    }

    function startLevel(levelNum) {
      gameState.currentLevel = levelNum;
      gameState.currentWordIndex = 0;
      gameState.score = 0;
      gameState.lives = 3;
      gameState.combo = 0;
      gameState.spellingState = null;
      
      rainGame = {
        basketX: 50,
        fallingLetters: [],
        collectedLetters: [],
        targetWord: '',
        gameInterval: null,
        isPlaying: false,
        powerups: { turbo: 1, freeze: 1, magnet: 1, bomb: 1 },
        isTurbo: false,
        isFreeze: false,
        isMagnet: false
      };
      
      gameState.currentScreen = `level${levelNum}`;
      renderCurrentScreen();
    }

    function exitLevel() {
      stopRainGame();
      gameState.currentScreen = 'levels';
      renderCurrentScreen();
    }

    function restartLevel() {
      startLevel(gameState.currentLevel);
    }

    function showLockedMessage() {
      const toast = document.createElement('div');
      toast.className = 'fixed top-4 left-1/2 -translate-x-1/2 bg-red-500 text-white px-6 py-3 rounded-xl font-bold z-50 bounce-in';
      toast.textContent = '🔒 ต้องผ่านด่านก่อนหน้าก่อน!';
      document.body.appendChild(toast);
      setTimeout(() => toast.remove(), 2000);
    }

    // Level 1 Functions
    function speakWord(word) {
      if ('speechSynthesis' in window) {
        const utterance = new SpeechSynthesisUtterance(word);
        utterance.lang = 'en-US';
        utterance.rate = 0.8;
        speechSynthesis.speak(utterance);
      }
    }

    function prevWord() {
      if (gameState.currentWordIndex > 0) {
        gameState.currentWordIndex--;
        renderCurrentScreen();
      }
    }

    function nextWord() {
      if (gameState.currentWordIndex < vocabularyData.length - 1) {
        gameState.currentWordIndex++;
        gameState.score += 10;
        renderCurrentScreen();
      } else {
        // ด่านเสร็จ - บันทึกและไปหน้าผลลัพธ์
        const stars = calculateStars(gameState.score, gameState.currentLevel);
        if (stars > 0) {
          saveProgress(gameState.currentLevel, stars);
        }
        gameState.score = 100;
        gameState.currentScreen = 'result';
        renderCurrentScreen();
      }
    }

    // Level 2 Functions
    function generateOptions(correctVocab, count) {
      const options = [correctVocab];
      const others = vocabularyData.filter(v => v.id !== correctVocab.id);
      
      while (options.length < count && others.length > 0) {
        const randomIndex = Math.floor(Math.random() * others.length);
        options.push(others.splice(randomIndex, 1)[0]);
      }
      
      return options.sort(() => Math.random() - 0.5);
    }

    function checkAnswer(selected, correct, element) {
      const buttons = element.parentElement.querySelectorAll('button');
      buttons.forEach(btn => btn.disabled = true);
      
      if (selected === correct) {
        element.classList.add('correct');
        gameState.score += 20 * (1 + gameState.combo * 0.1);
        gameState.combo++;
        showFeedback(true);
        updateLivesDisplay();
        
        setTimeout(() => {
          if (gameState.currentWordIndex < vocabularyData.length - 1) {
            gameState.currentWordIndex++;
            renderCurrentScreen();
          } else {
            gameState.currentScreen = 'result';
            renderCurrentScreen();
          }
        }, 1000);
      } else {
        element.classList.add('wrong');
        gameState.lives--;
        gameState.combo = 0;
        showFeedback(false);
        updateLivesDisplay();
        
        setTimeout(() => {
          if (gameState.lives <= 0) {
            gameState.currentScreen = 'result';
            renderCurrentScreen();
          } else {
            // Re-enable buttons to allow another try
            buttons.forEach(btn => btn.disabled = false);
            buttons.forEach(btn => btn.classList.remove('wrong', 'correct'));
          }
        }, 1000);
      }
    }

    function updateHeartsDisplay() {
      const heartsEl = document.querySelectorAll('span');
      let heartCount = 0;
      heartsEl.forEach((el, idx) => {
        if (el.textContent === '❤️' || el.textContent === '🤍') {
          if (heartCount < gameState.lives) {
            el.classList.remove('heart-empty');
            el.classList.add('heart');
            el.textContent = '❤️';
          } else {
            el.classList.remove('heart');
            el.classList.add('heart-empty');
            el.textContent = '🤍';
          }
          heartCount++;
        }
      });
    }

    // Level 3 Functions
    function selectSpellingLetter(id) {
      const state = gameState.spellingState;
      const item = state.availableLetters.find(l => l.id === id);
      if (item && !item.used) {
        item.used = true;
        state.selectedLetters.push(item);
        renderCurrentScreen();
      }
    }

    function removeSpellingLetter(idx) {
      const state = gameState.spellingState;
      if (state.selectedLetters[idx]) {
        const item = state.selectedLetters[idx];
        item.used = false;
        state.selectedLetters.splice(idx, 1);
        renderCurrentScreen();
      }
    }

    function checkSpelling() {
      const state = gameState.spellingState;
      const answer = state.selectedLetters.map(l => l.letter).join('');
      
      if (answer === state.targetWord) {
        gameState.score += 30 * (1 + gameState.combo * 0.1);
        gameState.combo++;
        showFeedback(true);
        
        setTimeout(() => {
          gameState.spellingState = null;
          if (gameState.currentWordIndex < vocabularyData.length - 1) {
            gameState.currentWordIndex++;
            renderCurrentScreen();
          } else {
            gameState.currentScreen = 'result';
            renderCurrentScreen();
          }
        }, 1000);
      } else {
        gameState.lives--;
        gameState.combo = 0;
        showFeedback(false);
        
        setTimeout(() => {
          if (gameState.lives <= 0) {
            gameState.currentScreen = 'result';
            renderCurrentScreen();
          } else {
            // Reset spelling state
            const vocab = vocabularyData[gameState.currentWordIndex];
            gameState.spellingState = {
              targetWord: vocab.word,
              availableLetters: vocab.word.split('').sort(() => Math.random() - 0.5).map((l, i) => ({ letter: l, id: i, used: false })),
              selectedLetters: []
            };
            renderCurrentScreen();
          }
        }, 1000);
      }
    }

    // Level 4 Functions
    function startRainGame() {
      rainGame.isPlaying = true;
      rainGame.collectedLetters = [];
      renderCurrentScreen();
      
      rainGame.gameInterval = setInterval(() => {
        spawnFallingLetter();
        updateFallingLetters();
        renderFallingLetters();
      }, 100);
    }

    function stopRainGame() {
      if (rainGame.gameInterval) {
        clearInterval(rainGame.gameInterval);
        rainGame.gameInterval = null;
      }
      rainGame.isPlaying = false;
    }

    function spawnFallingLetter() {
      if (Math.random() > 0.95 && rainGame.fallingLetters.length < 10) {
        const targetLetters = rainGame.targetWord.split('');
        const nextNeeded = targetLetters[rainGame.collectedLetters.length];
        
        // 55% chance for correct letter, 45% for wrong letters
        const isCorrect = Math.random() < 0.55 && nextNeeded;
        let letter;
        
        if (isCorrect) {
          letter = nextNeeded;
        } else {
          // Generate wrong letter - can be duplicate or different
          letter = String.fromCharCode(65 + Math.floor(Math.random() * 26));
        }
        
        rainGame.fallingLetters.push({
          id: Date.now() + Math.random(),
          letter: letter,
          x: Math.random() * 85 + 5,
          y: 0,
          isCorrect: letter === nextNeeded,
          speed: 1.5 + Math.random() * 1.5
        });
      }
    }

    function updateFallingLetters() {
      const speedMultiplier = rainGame.isFreeze ? 0.3 : 1;
      const targetLetters = rainGame.targetWord.split('');
      const nextNeeded = targetLetters[rainGame.collectedLetters.length];
      
      rainGame.fallingLetters = rainGame.fallingLetters.filter(letter => {
        letter.y += letter.speed * speedMultiplier;
        
        // Magnet effect
        if (rainGame.isMagnet && letter.isCorrect) {
          letter.y += 2;
        }
        
        // Check if letter fell off screen - only lose lives for the NEXT NEEDED letter
        if (letter.y > 100) {
          if (letter.letter === nextNeeded) {
            gameState.lives--;
            gameState.combo = 0;
            updateLivesDisplay();
            showToast('❌ ตัวอักษรถูกตกหล่นไป!');
            if (gameState.lives <= 0) {
              stopRainGame();
              gameState.currentScreen = 'result';
              renderCurrentScreen();
            }
          }
          return false;
        }
        return true;
      });
    }

    function renderFallingLetters() {
      const container = document.getElementById('falling-letters');
      if (!container) return;
      
      container.innerHTML = rainGame.fallingLetters.map(letter => `
        <div class="falling-letter ${letter.isCorrect ? '' : 'wrong'}" 
             data-letter-id="${letter.id}"
             style="left: ${letter.x}%; top: ${letter.y}%;">
          ${letter.letter}
        </div>
      `).join('');
      
      // Add click handlers to all letters
      document.querySelectorAll('[data-letter-id]').forEach(el => {
        el.addEventListener('click', function(e) {
          e.stopPropagation();
          const id = this.dataset.letterId;
          collectLetter(id);
        });
      });
    }

    function collectLetter(id) {
      // Find letter by exact ID match
      let letterIndex = -1;
      let letter = null;
      
      for (let i = 0; i < rainGame.fallingLetters.length; i++) {
        if (rainGame.fallingLetters[i].id == id) {
          letterIndex = i;
          letter = rainGame.fallingLetters[i];
          break;
        }
      }
      
      if (!letter || letterIndex === -1) return;
      
      const targetLetters = rainGame.targetWord.split('');
      const nextNeeded = targetLetters[rainGame.collectedLetters.length];
      
      // Remove letter from falling list
      rainGame.fallingLetters.splice(letterIndex, 1);
      
      if (letter.letter === nextNeeded) {
        // Correct letter collected
        rainGame.collectedLetters.push(letter.letter);
        gameState.score += 50 * (1 + gameState.combo * 0.2);
        gameState.combo++;
        
        // Speed up remaining falling letters
        rainGame.fallingLetters.forEach(l => {
          l.speed += 0.5;
        });
        
        showFeedback(true);
        updateScoreDisplay();
        updateLivesDisplay();
        
        // Update target word display
        const targetBox = document.getElementById('target-word-box');
        if (targetBox) {
          targetBox.innerHTML = `
            <div class="flex justify-center gap-2">
              ${rainGame.targetWord.split('').map((letter, idx) => {
                const collected = rainGame.collectedLetters[idx];
                return `
                  <div class="letter-box ${collected ? 'bg-gradient-to-b from-green-400 to-emerald-500 border-green-600 shadow-lg' : 'bg-gradient-to-b from-purple-400 to-indigo-500 border-purple-700'} transition-all duration-300">
                    ${letter}
                  </div>
                `;
              }).join('')}
            </div>
          `;
        }
        
        // Instantly render falling letters
        renderFallingLetters();
        
        // Check if word complete
        if (rainGame.collectedLetters.length === targetLetters.length) {
          gameState.score += 100;
          stopRainGame();
          
          setTimeout(() => {
            if (gameState.currentWordIndex < vocabularyData.length - 1) {
              gameState.currentWordIndex++;
              rainGame.collectedLetters = [];
              rainGame.fallingLetters = [];
              renderCurrentScreen();
            } else {
              gameState.currentScreen = 'result';
              renderCurrentScreen();
            }
          }, 1500);
        }
      } else {
        // Wrong letter
        const targetBox = document.getElementById('target-word-box');
        if (targetBox) {
          targetBox.classList.add('shake');
          setTimeout(() => targetBox.classList.remove('shake'), 300);
        }
        gameState.lives--;
        gameState.combo = 0;
        showFeedback(false);
        updateLivesDisplay();
        
        // Instantly render without the collected letter
        renderFallingLetters();
        
        if (gameState.lives <= 0) {
          stopRainGame();
          gameState.currentScreen = 'result';
          renderCurrentScreen();
        }
      }
    }

    function skipWord() {
      // หยุดเกมฝนหากกำลังเล่นอยู่
      if (gameState.currentScreen === 'level4') {
        stopRainGame();
      }
      
      gameState.score += 100;
      gameState.combo++;
      showToast('⏭️ ข้ามคำศัพท์! +100 คะแนน');
      
      if (gameState.currentWordIndex < vocabularyData.length - 1) {
        gameState.currentWordIndex++;
        gameState.spellingState = null;
        rainGame.collectedLetters = [];
        rainGame.fallingLetters = [];
        renderCurrentScreen();
      } else {
        // ด่านเสร็จ - บันทึกและไปหน้าผลลัพธ์
        const stars = calculateStars(gameState.score, gameState.currentLevel);
        if (stars > 0) {
          saveProgress(gameState.currentLevel, stars);
        }
        gameState.currentScreen = 'result';
        renderCurrentScreen();
      }
    }

    function usePowerup(type) {
      if (rainGame.powerups[type] <= 0) return;
      rainGame.powerups[type]--;
      
      switch(type) {
        case 'turbo':
          gameState.lives = Math.min(gameState.lives + 1, 3);
          showToast('❤️ +1 พลังชีวิต!');
          break;
        case 'freeze':
          rainGame.isFreeze = true;
          showToast('❄️ ชะลอเวลา 5 วินาที!');
          setTimeout(() => { rainGame.isFreeze = false; }, 5000);
          break;
        case 'magnet':
          rainGame.isMagnet = true;
          showToast('🧲 ดูดตัวอักษร 5 วินาที!');
          setTimeout(() => { rainGame.isMagnet = false; }, 5000);
          break;
        case 'bomb':
          rainGame.fallingLetters = rainGame.fallingLetters.filter(l => l.isCorrect);
          showToast('💣 ล้างตัวอักษรหลอก!');
          break;
      }
      
      updateLivesDisplay();
      renderCurrentScreen();
    }

    // UI Helper Functions
    function showFeedback(isCorrect) {
      const toast = document.createElement('div');
      toast.className = `fixed top-1/2 left-1/2 -translate-x-1/2 -translate-y-1/2 text-6xl z-50 bounce-in`;
      toast.textContent = isCorrect ? '✅' : '❌';
      document.body.appendChild(toast);
      setTimeout(() => toast.remove(), 800);
    }

    function showToast(message) {
      const toast = document.createElement('div');
      toast.className = 'fixed top-20 left-1/2 -translate-x-1/2 bg-white/95 text-gray-800 px-6 py-3 rounded-xl font-bold z-50 bounce-in shadow-lg';
      toast.textContent = message;
      document.body.appendChild(toast);
      setTimeout(() => toast.remove(), 2000);
    }

    function updateScoreDisplay() {
      const scoreEl = document.getElementById('rain-score');
      const comboEl = document.getElementById('rain-combo');
      if (scoreEl) scoreEl.textContent = Math.floor(gameState.score);
      if (comboEl) comboEl.textContent = `${gameState.combo}x`;
    }

    function updateLivesDisplay() {
      const livesEl = document.getElementById('rain-lives');
      if (livesEl) {
        livesEl.innerHTML = [1,2,3].map(i => {
          if (gameState.lives >= i) {
            return `<span class="text-2xl heart">❤️</span>`;
          } else {
            return `<span class="text-2xl heart-empty">🤍</span>`;
          }
        }).join('');
      }
    }

    function calculateStars(score, level) {
      const thresholds = {
        1: [50, 80, 100],
        2: [100, 150, 200],
        3: [150, 250, 350],
        4: [200, 400, 600]
      };
      const t = thresholds[level] || [100, 200, 300];
      if (score >= t[2]) return 3;
      if (score >= t[1]) return 2;
      if (score >= t[0]) return 1;
      return 0;
    }

    function calculateTotalStars() {
      return gameState.completedLevels.length * 3;
    }

    function calculateLevelStars(level) {
      return gameState.completedLevels.includes(level) ? 3 : 0;
    }
